<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Icon Generator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #667eea;
            color: white;
        }
        .container {
            text-align: center;
        }
        canvas {
            border: 2px solid white;
            margin: 20px;
            border-radius: 20px;
        }
        button {
            padding: 15px 30px;
            font-size: 16px;
            background: white;
            color: #667eea;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin: 10px;
            font-weight: bold;
        }
        button:hover {
            background: #f0f0f0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📦 Icon Generator</h1>
        <p>Click buttons below to generate and download app icons</p>
        
        <canvas id="canvas192" width="192" height="192"></canvas>
        <br>
        <button onclick="generateIcon(192)">Download Icon 192x192</button>
        
        <br><br>
        
        <canvas id="canvas512" width="512" height="512"></canvas>
        <br>
        <button onclick="generateIcon(512)">Download Icon 512x512</button>
    </div>

    <script>
        function drawIcon(canvas) {
            const ctx = canvas.getContext('2d');
            const size = canvas.width;
            
            // Background gradient
            const gradient = ctx.createLinearGradient(0, 0, size, size);
            gradient.addColorStop(0, '#667eea');
            gradient.addColorStop(1, '#764ba2');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, size, size);
            
            // Draw box icon
            const iconSize = size * 0.6;
            const x = (size - iconSize) / 2;
            const y = (size - iconSize) / 2;
            
            // Box body
            ctx.fillStyle = 'white';
            ctx.fillRect(x, y + iconSize * 0.2, iconSize, iconSize * 0.7);
            
            // Box top
            ctx.beginPath();
            ctx.moveTo(x, y + iconSize * 0.2);
            ctx.lineTo(x + iconSize / 2, y);
            ctx.lineTo(x + iconSize, y + iconSize * 0.2);
            ctx.lineTo(x + iconSize / 2, y + iconSize * 0.4);
            ctx.closePath();
            ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
            ctx.fill();
            
            // Box tape
            ctx.fillStyle = '#764ba2';
            ctx.fillRect(x + iconSize * 0.4, y + iconSize * 0.2, iconSize * 0.2, iconSize * 0.7);
            
            // Add check mark
            ctx.strokeStyle = '#10b981';
            ctx.lineWidth = size * 0.05;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            
            ctx.beginPath();
            ctx.moveTo(x + iconSize * 0.3, y + iconSize * 0.55);
            ctx.lineTo(x + iconSize * 0.45, y + iconSize * 0.7);
            ctx.lineTo(x + iconSize * 0.7, y + iconSize * 0.4);
            ctx.stroke();
        }

        // Draw initial icons
        drawIcon(document.getElementById('canvas192'));
        drawIcon(document.getElementById('canvas512'));

        function generateIcon(size) {
            const canvas = document.getElementById(`canvas${size}`);
            
            // Convert to blob and download
            canvas.toBlob(blob => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `icon-${size}.png`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
                alert(`✅ Downloaded icon-${size}.png!\nPlease save it to the 'fronend' folder.`);
            });
        }
    </script>
</body>
</html>
